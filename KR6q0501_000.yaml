front:
  text: 香林佛古禪師語録序古唐語録者西蜀佛古禪師駐錫於婁之古唐開林説法其侍者從梵筵載筆而記者也佛所説經與菩薩造論僧祗戒律踰五千四百餘卷而其後乃分為南北藏迦葉奉遺教傳二十四祖以逮達磨度江為此土始祖而其後乃分為南北宗又各立門庭而有五宗之別馬馱龍負皮紙空繁象顧獅嚬狐嗥晝現此爛熳之花惜者所以指為衰而盛午之明智士所以憂其昃也佛師來自梓州靈根宿植五歲入青蓮寺已灰心作巢頂禪水火不能焦濡矣笻杖挑雲未瓢插雪遍踏天下名山參訪燈幢嫡嗣所過香林寶塔輒見舍利放光脊中神透空裏靈飛於是通玄林和尚囑以真諦然猶軟草承趺自聞天語也又六年雲屩偶過婁東婁人士瞻仰鶴姿莫不延脰觀之降情誘接聽其一言嚗然破人悶鬱乃相與掃香林之靜苑布法席於香臺古唐近在婁西原田膴膴茅堂菌閣銜土初成佛師提唱宗風學侶雲集而衣荔飯松封泥運甋一任其真甘苦同趣州人感之抖囊蠲佐未幾柳路漸入禪林桑津讓為定水海岸古塘與竺天古德交映千秋今覽其語録擊碎虛空打翻窠窟從不思議中流出玉漿向大千法界重回寶炬無一語不為人發意葉開心香者所謂豐干坐虎豆圖收蛇不過尋常舉動而雲門喫茶趙州喫粥便是無上風規今日古唐赤髭亦騎得象王獅子真為苦海船師者矣學人輩讀此等話不能解黏去縛且效釋迦嚼六年麻麥再向不死亭前指出香樓可也順治辛卯中秋婁東法弟胡周鼒拜題佛古禪師語録引溯昔初祖折蘆五宗紹葉下至北山南嶽曹洞趙州應化現真金鎞度世而一時宰官哲士又皆皈心夙業標勝禪宗信乎古德機緣文人妙喜並合兩行用證千古西蜀佛古禪師來自婁水觀乎上京祖皇帝眷禮特優訪咨時及遂卓錫千佛蘭若為四道唱宗古貌和風宏才妙覺單拈直指導達天人緇素同時連軌接坐莫不心契香城身依淨域乃以上堂淵旨傳示及余妙證微言心光迸現傾河注燭豁爾神開借此舌本清涼示世以耳根圓頓堂頭一席地何遜如來第四時耶顧余不敏宿仰宗風師行將歸敢以三言仰質塵外牟尼座前師子心生鏡現相威真空畢竟因緣以何了證文殊猛參畢力敷讚維摩默指一語不設漸頓增減以何合併我聞四字華嚴六百無量為涯一念作本後先詳略以何分際惟師解粘釋縛隨口津梁灑出本地風光廣付當場杖鉢是月是指為風為幡不敏敬以心香俟之矣師其高座古唐為下一轉語康熙壬寅春正月賜進士及第翰林院修撰徐元文科題佛古禪師語録目録序文卷第一住太倉香林禪院語録卷第二嘉興平湖曹溪禪院語録燕都千佛禪院語録燕京圓寧禪院語録卷第三拈古頌古像贊偈佛事卷第四塔銘目録終
