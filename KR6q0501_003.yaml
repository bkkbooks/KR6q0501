body:
  text: 嗣法門人超質等編拈古德山托缽師云者老漢雖則明脩棧道暗度陳倉可惜罕逢作家當時見伊與麼使云不必非惟截斷葛藤亦且自有生涯報慈讚龍牙真云日出連山月圓當戶不是無身不欲全露牙一日在帳中坐僧問不是無身不欲全露請師全露牙撥開帳云見麼僧云不見牙云不將眼來慈聞云龍牙只道得一半龍牙全身獨露這僧覿面不逢當時撥開帳子好與和身推倒非但龍牙容身無地抑令報慈目瞪口呿昔有秀才問長沙某甲曾看千佛經百千諸佛但見其名未審居何國土長沙召秀才才應諾沙云黃鶴樓崔顥題後秀才還曾題否才云不曾題沙云得閒題取一篇好者則公案十箇有五雙都向黃鶴樓上閒題一篇處鑽研殊不知長沙有頭無尾置人中路當時待伊應諾便云居何國土不惟親見諸佛管教七步成文霍山景通禪師因到仰山前乃翹一足云西天二十八祖亦如是唐土六祖亦如是和尚亦如是某甲亦如是仰山下禪床打四藤條當時山僧若見亦與四藤條何故有意氣時添意氣不風流處也風流南院一日陞堂云諸方只具啐啄同時眼不具啐啄同時用有僧問如何是啐啄同時用院云作家不啐啄啐啄同時失僧云此猶未是某甲問處院云你問處作麼生僧云失院乃打僧不肯南院列陣千里縱奪可觀者僧善能抗敵其力未充若是本分衲僧管取南院棒折楊岐甄叔禪師因禪月問如何是祖師西來意叔呈起素珠月罔措叔云會麼月云不會叔云某甲參見石頭月云見石頭得何意旨叔指庭前鹿云會麼月云不會叔云渠儂得自由楊岐老漢賣寶遇著瞎波斯置之勿論只是不合向者僧手裏呈款何故啼得血流無用處不如緘口過殘春明招謙上堂云風頭梢硬暖室商量纔到暖室便見瞌睡以杖一時打散這老漢與麼提唱大似欲隱彌露雖然如是爭奈忙忙者匝地普天楊岐見石霜化主至問云征行戰將假道經過劄寨既圓何不與楊岐草戰主云昔時謬向途中覓今日親逢老作家岐云楊岐且輸小捷去也主便喝岐云亂做作甚麼主將坐具劃一劃岐云齋後鐘主便噓岐云只這箇別更有在主無語岐云敗將不斬且喫茶去這僧將成九仞之山只欠一簣之土當時待云只者箇別更有在好將坐具劈面便摵不惟光前絕後亦且自有出身睦州見僧便云現成公案放汝三十棒僧云某甲如是州曰山門頭金剛為什麼舉拳僧云金剛尚乃如是州便打臨危不變真大丈夫須還者僧始得若是現成公案驢年未會得在高亭初參德山隔江問訊山以手招之亭忽然開悟乃橫趨而去更不回顧後開法嗣德山德山招手高亭悟去正是焦磚打著連底凍只如大慧云高亭要嗣德山猶與德山隔江在且道是肯語不肯語石頭問長髭甚處來髭云嶺南來頭云大庾嶺頭一舖功德成就也未髭云成就久矣只欠點眼頭云莫要點麼髭云便請頭垂下一足髭便禮拜頭云子見甚麼道理便禮拜髭云如紅爐上一點雪絲來線去暗合明投二老分中足可觀光若是香林門下棒折未肯放過何故不見道棋逢敵手須為美詩到重吟始見工南陽忠國師一日喚侍者者應諾如是三召三應國云將謂吾孤負你卻是你孤負吾國師三喚倒腹傾腸侍者三應毫無厭怠且道負吾負汝又作麼生珊瑚枕上兩行淚半是思君半恨君趙州一日見僧掃地遂問與麼掃還淨潔也無僧云轉掃轉多州云豈無撥塵者僧云誰是撥塵者州顧視云會麼僧云不會州云問取雲居去僧後問雲居如何是撥塵者居云者瞎漢二老宿可謂當斷不斷致使轉掃轉多山僧這裏又且不然待云誰是撥塵者便接過掃帚痛與一頓為甚如此不見道為人須為徹僧問幽溪大用現前不存軌則時如何溪起遶禪床一匝而坐僧擬進語溪與一踏僧歸位溪云你與麼我卻不與麼你不與麼我卻與麼僧擬進語溪又與一踏云三十年後吾道大行這老漢費盡腕頭氣力要且踏這僧不著頌古舉世尊初生一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊多生習氣久懷藏迥出胞胎便舉揚一句閒言流世諦令人千古沸如湯舉世尊在靈山會上拈花示眾眾皆默然唯迦葉破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑於你一丸殃彈從天降遇著冤家定可傷四海五湖玄味客不知是酪是砒霜舉殃崛摩羅因持缽至一長者門其家婦人正值產難長者曰瞿曇弟子你為至聖當有何法能免產難崛曰我乍入道未知此法待我回去問世尊及返白佛佛曰你速往言我從賢聖法來未曾殺生崛疾往告其婦聞之即娩剛然持缽值新春野草閒花覿面呈雨過雙猿啼谷口一聲疏又一聲親舉世尊一日陞座大眾集定文殊白椎曰諦觀法王法法王法如是世尊下座曲彔未登已不堪臨場何必再三三縱然椎下支吾過列聖叢中若箇甘舉世尊因五通仙人問世尊有六通我有五通如何是那一通佛召五通仙人仙人應諾佛曰那一通你問我分疏不下且從容你問我時那一通止濼困鱗休激浪栖蘆病羽謾搏風舉城東有一老母與佛同生不欲見佛每見佛來即便迴避雖然如此回顧東西總皆是佛遂以手掩面乃至十指掌總皆是佛迴避無門事浩繁依稀掩面又遮謾機關用盡藏身術總把傍人作笑端舉無邊身菩薩將竹杖量世尊頂丈六了又丈六量到梵天不見世尊頂乃擲杖合掌說偈云虛空無有邊佛功德亦然若有能量者窮劫不可盡竹杖量時也不妨手頭何似舌頭忙巍巍頂相無高下豈向人前論短長舉世尊因調達謗佛生身入地獄遂令阿難問你在獄中安否曰我雖在地獄中如三禪天樂佛乂令問你還求出否曰我待世尊來便出阿難曰佛是三界導師豈有入地獄分調達曰佛既無入地獄分我豈有出地獄分捺落三禪事不差生涯隨處可成家既云出入無時節未免當風又撒沙舉世尊於涅槃會上以手摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億眾悉皆契悟百樣千般作不了臨期原要弄精魂墮坑落塹知多少未許何人是報恩舉二祖初至少林參尋達磨立雪斷臂悲淚求法磨知是法器乃曰諸佛最初求道為法忘形你今斷臂求亦可在祖曰諸佛法印可得聞乎磨曰諸佛法印不從人得祖曰我心未寧乞師安心磨曰將心來與你安祖曰覓心了不可得磨曰與你安心竟祖於此悟入萬物經霜猶斂衽紅梅偏向雪中開早知無法為人說豈把娘生臂斷來舉六祖受法夜抵法性寺風颺剎竿聞二僧對論一云旛動一云風動往復未契祖曰不是風動旛動仁者心動耳後開法東山風捲殘雲過海潮乾坤震動鬼神謠當時閉口能藏舌誰敢當前喚獦獠舉德山一日飯遲托缽下堂時雪峰作飯頭見便云者老漢鐘未鳴鼓未響托缽向什麼處去山低頭歸方丈峰舉似巖頭頭曰大小德山未會末後句山聞令侍者喚來問你不肯老僧那頭密啟其意山乃休去至明日陞堂果與尋常不同頭至僧堂前撫掌笑曰且喜老漢會末後句雖然如是只得三年活山果三年而沒玉篴雙雙和夕陽調中誰別羽宮商縱然不入巫山徑也使愁人幾斷腸舉巖頭值沙汰於鄂渚湖邊作渡子兩岸各掛一板有人過渡打板一下頭乃舞棹迎之一日因一婆抱一孩兒來問曰呈橈舞棹即不問且道婆手中兒甚處得來頭便打婆曰婆生七子六箇不遇知音只者一箇也不消得便拋向水中嬰兒驀擲浪花飛瞥起漁翁羅釣磯楊柳岸曉風依待船人立渡頭稀舉丹霞於慧林寺遇天寒取木佛燒火向院主訶曰何得燒我木佛霞以杖撥灰曰吾燒取舍利曰木佛何有舍利霞曰既無舍利更請兩尊燒主自後眉鬚墮落客旅無繇破寂寥三尊請下火中燒眉鬚墮落方知佛恩大難酬一杖挑舉百丈侍馬祖遊山次見野鴨飛過祖曰是什麼丈曰野鴨子曰什麼處去也丈曰飛過去也祖扭丈鼻頭負痛失聲祖曰又道飛過去也丈於此契悟痛徹心酸眼淚流無端惹得一場羞只云野鴨方飛去不道擒來在鼻頭舉昔有一婆供養一菴主二十餘年嘗令二八女子送食一日令女子抱定云正當與麼時如何主曰枯木倚寒巖三冬無暖氣女歸舉似婆婆曰我二十年只供養得箇俗漢遂趁出燒卻菴纖長姬臂正交圍好把吹毛劈面揮性命若教當下絕茆菴豈作火雲飛舉陸亙大夫問南泉曰肇法師也甚奇怪解道天地同根萬物一體泉指庭前牡丹曰大夫時人見此一株花如夢相似杖影無端落荒草夢中說夢南泉老栴檀林下雨新花香風八面倩誰掃南泉因兩堂爭貓兒泉見提起貓兒問曰道得即救取貓兒道不得即斬卻眾無對泉便斬之趙州從外歸泉舉前話州脫草鞋戴頭上便出泉曰子若在救得貓兒提起貓兒驗眾流當場誰敢犯鋒頭草鞋頂戴歸來晚致使兩堂一命酬舉臨濟禪師謂眾曰吾滅後不得滅卻吾正法眼藏三聖曰爭敢滅卻濟曰已後有人問你向他道甚麼聖便喝濟曰誰知吾正法眼藏向者瞎驢邊滅卻臨濟語話甚郎當引得傍觀笑幾場豪氣一身都喪卻名存忤逆播諸方舉睦州見僧乃曰見成公案放你三十棒曰某甲如是州曰三門頭金剛為什麼舉拳曰金剛尚乃如是州便打曰者掠虛漢走電奔雷劈面來銀山鐵壁盡衝開龍門自古風濤惡無限金鱗點額回舉法眼因僧惠超問如何是佛眼曰你是惠超僧於是悟入至寶塵埋久已哉忽聞提著便驚懷雖然獲得深藏物只恐朦朧錯認來舉石霜慈明禪師僧問如何是佛明曰水出高原瀉出雲根冷似秋瞪眸孰見古源頭澆田潑菜尋常事一滴聲消萬派流像贊接引像相好端嚴絕覆藏塵塵剎剎露乖張眾生有願來吾國豈免頻伸一臂長阿師原不定西方處處逢渠處處彰垂臂誘他癡男女誰知道你熱心腸魚籃大士世云救苦法吾道不思議處處露乖角頭頭非躲避良哉觀音討甚巴鼻獲得金鱗休便休何須長走村坊市結衣大士散髮輪珠無間說一領襤毿百箇結人道千手放神光我云兩足空跋涉關帝像握偃月刀裂群魔膽三界稱尊具什麼眼天童本師林老和尚川藞苴卒難測眼中無痕皮下有血掀翻臨濟家私捉敗密翁老賊五坐道場千江一月了無佛法與人傳要且無人敢辨別又目清四海舌卷三乘人天蟻聚龍象蜂騰拄杖橫拈太白頂幾多甲羽化鶤鵬自贊自思自忖一無長御駕親臨懶下床莫謂道人心似鐵惡聲惟恐播諸方又四處開堂心慈口惡截生死流解聖凡縛耆年宿德更加艾灼正令當行誰敢圖度題渭谿周公像蘆岸悠悠繫小舟綸竿直餌待鱗投等閒月露秋江色只要谿翁豁兩眸偈贈月川法姪潑天門戶仗君撐截斷諸方爛葛藤四海英靈來入罟直須揀選上傳燈豈凡金相國於燕都鑿放生池中建念佛臺其形似舟顏曰大法船偈以贈之怪哉高埠駕慈舟為載群情過溺流帆影不隨風力轉櫓聲常瀉月明秋與文威首座鈯谷從教授子孫深藏幽谷了無痕傳芳不在匡徒眾接箇英靈卒報恩報國寺觀松陰森盤結梵王宮歷雪經霜未改容品藻謾云天子重孤標疑許我同風興誠寺龍爪槐梵宇飛霜樹不秋新條吐月醒群眸風前已露擎雲手舒卷扶疏任自由賀內府瑞齋馬公六旬西峰爛熳飛紅雨北海扶搖綻碧桃幾度流觴閒醉月蓬萊隨處奪高標寄西臣胡給諫昔將玉麈囑王臣要在今時用最親雪曲一聲驚碧落山林無處不陽春和靈嵒慈受禪師披雲臺頌移茅剛畏不深山豈把潛形當等閒一幅伽黎無計綴至今風化白雲間秋江薄暮火初紅釣叟懷鱗興未窮活計一生明月下教渠何處避霜風搕都盧布袋頭般般拈出賣風流長街短巷人無數笑絕驢年卒未休師將南旋眾信索偈迅筆示之松筠惠我隱長灣傲雪凌霜不等閒恒笑詩人吟月下曾無奇想到香山玉顏含笑曉風初馥郁微微度草廬何事洞庭輕漏洩令人遙遞嶺南書瘦影橫窗月共扶翛然世外道情孤紅塵滾滾如煙霧紫白芳菲半點無佛事為普濟天一禪師起龕娑羅雙樹白雲浮斗換星移海岳愁蹤跡不妨隨處寄卻教萍水見無儔恭惟某生慚濁世薙染獅林運寶筏於當湖插莖茅於普濟風生宇宙韻響天人物我恬然極為介潔石期月離碧浪影落雲衢樵徑迷源漁舟失櫂靈機既爾遠徹幻跡何須久停乘此廣大風輪足可神通游戲還委悉麼等閒飛起無毛鷂天上人間騰瑞氣舉火爍破無生窠超出有情見直下赤條條清風來八面闍維金色身舍利火中見見不見擲下火炬云萬里神光腦後生一枝優缽腳跟綻若木法師掩龕灰飛蘆管一陽生翼負青天萬里程巴峽猿啼猶未歇悠悠故國得同人恭惟某德周三際聲動五湖搖唇鼓舌而淨演真機瞬目揚眉而指揮箇事不意煙波失棹樵徑含光草木萋然象龍悵望今則長空絕跡教海無文既爾火浴無期便請雲龕端坐遂以手掩龕云義虎跡藏無位次法幢高豎有兒孫休菴法姪掩龕白玉寧非貴黃金豈是尊清飆連夜吼驚走鐵崑崙惟我休公孤標越格氣宇天然餐煙水於百城飽星霜於萬里眉藏山嶽掌握乾坤荷法祥之重擔草木舒機紹船子之真規魚龍知命正擬青蓮吐艷碧藕添鮮豈期綠岸潛光荷風頓息今則雲龕既入火浴臨時放下全身莫大自在遂掩卻舉火飛猿動曦光菡萏開宿霧羨子志不群獨跨大方步去來既無轍生滅安有路足底自分明何須吾囑付擲火炬云靈根不假栽培力燁燁曇華透火開祖印哲法姪孫封龕四載巾瓶不蹔離三呼三應絕遲疑而今既唱還鄉曲明月清風處處宜我某侍者深慚代變剃落香林過淨瓶於古佛之間酬犀牛於扇破之際風生大野韻響龍樓寒溫不異欣戚同然豈期青峰雲靉靆綠岸月朦朧瞥轉關頭風前獨步只如藏身處沒蹤跡沒蹤跡處莫藏身還委悉麼以手封龕云端入那伽三昧定任他門外逆風吹楚惟禪師炳苣三度金門事可傷區區寧謂路頭長因思織履酬甘旨冒暑衝寒未敢忘我楚公禪師研窮教觀密契宗乘履踐以時進退有節頗宜中流砥柱起剔昏迷不料天喪子躬椿萱失望正當春光斂艷就路還家一句如何話會攛下火炬云獨步丹霄乘快便木蘭花發露全身寂常老師掩龕囊錐穎脫玉鏡潛輝寶鐸聲沉靈鋒斂匣恭惟某榻依師子斷髮嚴身履泊旃檀披緇翫日堪隨法幢振燿慧海揚帆遂適寒溫耋齡將慶不意頓辭梵苑冥合蓮宮直躡毘盧略無回互所謂葉落歸根無影樹頭雲片片香飄果熟不萌枝上月珊珊雖則淨穢有分且喜去來無礙正當藏蹤斂跡一句又作麼生道卓拄杖云大千沙界海中漚一切聖賢如電拂寂然禪師掩龕葉脫山根見雲收天際橫峨眉舒一線斜照五湖清恭惟某越三峽而兢千峰飽林泉而嘯風月倏爾撥轉關捩寂寞藏身坐斷乾坤凝然不露且未埋玉樹先入雲龕一句作麼生道以拄杖劃一劃云封臨濟三十二世香林寺佛古聞禪師塔銘自古禪林僧寶印法必擇明師而行道不承師蔭蓋非遇明眼作家豈得傳持不謬所以稱鵝王擇乳素非鴨類也果能隨處作主必然遇緣即宗所以稱出群獅子吼震天外也自求法不擇真師而主院欲承父業則師家以名位籠人而學者以小才錄用弘道二字僅屬虛名法運於是乎寖衰矣求其慧命果得真傳而道緣不求自至如我香林佛古禪師者今時豈易得哉師諱行聞號佛古西潼川張氏子家世好善母劉孺人尤有令德明萬曆庚戌年六月二十二日午時師示生時有星者留讖云庚戌造化四柱清五星一木自天成玄峰月印婁江水五葉芬芳第一人人莫能測其意星者蓋異人也師幼時岐嶷卓犖出語驚人五歲忽腋下生毒肺腑皆見父母憂駭卜之謂當離俗乃送入青蓮寺依印宗錫禪師出家七歲宗攜師謁峨嵋屢見普賢大士放光師問宗大士已過去云何得放光現瑞宗笑而不答於是疑情驟發常默自參究至崇禎庚午年二十有一抵金陵隨喜報恩復睹塔光交燦五色盈空驀觸前疑徹明大事是年遂於金陵古林受具足戒次歷禪林講肆諮益諸宗匠莫不歎為法中龍象也癸未夏通玄林野奇和尚出天台寓盛澤師往參見值和尚上堂師便問出格雄才巧妙尖新不涉言詞請師速道和尚曰雨霾山色暗師曰恁麼則一真獨露萬緣俱盡和尚曰如何是你萬緣俱盡處師曰且禮和尚一拜和尚曰伶俐衲僧一撥便轉師便喝和尚頷之是秋詣通玄省和尚即命典客屢次入室投機疊呈拈頌多許可更加以妙密鉗鎚師益傾心領受次年甲申季春遂承付囑繼遇兵燹之慘師服勤左右須臾不離復隨和尚住東塔栖真兩剎竭力輔弼不辭勞苦六載如一日也順治庚寅偶過婁江憩海印諸檀越請住古唐師因憶幼時有月印婁江之讖遂往駐錫焉櫛風沐雨辛勤拮据感檀越王氏捨地漸成叢林提持勿懈學侶雲臻由是宗風日振於東南矣余同年友其章胡給諫敬信之願為外護門人錄師第一會說法語付剞劂氏給諫序之謂師言句從不思議中流出無一語不為人發意葉開心香者蓋師行真實行說真實法故遠近歸心人無間言云丙申浙西當湖邑侯朱公及諸紳士創曹溪禪院請師開法師鑑其誠而應之住三載堂構煥然規制漸備而婁江州牧白公復迎師歸古唐時遭饑饉締搆維艱我世祖章皇帝究心宗乘問及林野奇和尚語錄師因齎入都門進呈御覽上覽畢歎曰本色說法真古人家風也師暫憩隆安寺聖駕不時臨幸一日方丈山曉晢禪師陪上至禪室師跏趺禪定不起於座上注視之歎曰貌古神清遂問曉此僧向住何處曉對曰太倉州古唐香雲上曰香雲不如香林好遂賜今寺額焉未幾而龍馭上賓師受千佛院之請上堂祝聖云宴坐隆安七尺床駕臨一見意何長追思無計酬恩澤今古惟憑一瓣香既而結制圓寧開戒法興凡法幢建處皆風行草偃自王公暨士庶無有不聞而敬仰見而悅服者也一日忽賦詩一章贈檀越賈義吾微示厭世之意時丙午年十一月二十一日也次日同門法曇禪師來訪作家相見各出手眼歡敘而別至二十三日子時呼侍者更衣端坐而逝世壽五十有七法臘三十有五行化二十餘載坐南北道場五處嗣法弟子自石璞超質至智中超沅等共十六人語錄三卷入藏行世諸弟子輩推質公繼席香林質公以本寺為師最初弘法之地且久展化機四眾哀慕因迎龕南歸建窣堵波於寺之東岡其南北舟車之費皆義吾為之經畫不負師最後贈詩之意也師為人恬澹質朴立言制行無非本色風規予與師初邂逅於放生池上後往來日久契誼最深今予忝得記莂於弘覺老人與師稱法門雁行心期方遠而喪我良朋不得不愾焉永歎也其受業弟子德涵尚公述師行業頗詳請予撰塔上之銘予素敬師得法行道頭尾俱正堪為末法之砥柱苦海之津梁者因為誌其大略而銘之曰臨濟一宗法道全備上接曹溪軼群良驥楊岐龍驤虎丘虎視奕葉燈傳人傑世瑞天童出興獅象攸萃法印授受如水傳器卓哉林野尤推出類證道固難養德匪易師善繼之造詣淵邃用志冥深抒懷朗粹一睹塔光洞徹奧閟栗棘蓬中揚鑣頓轡倒捋虎鬚爪牙銛利殫力股肱靡事弗治滹沱衣拂鄭重舉畀蓄養深厚超凡聖位五坐道場緣不思議自南而北教澤廣被禪定跏趺聖駕忽至淵默雷聲西來祖意不起於座帝心嘉異貌古神清稱歎高致惟茲古唐其弘法地寺額香林金口親賜克家繼席闡第一義肯堂肯構典型弗墜結集法言善述師事流通終古樹大法幟師志惟誠師行無偽千秋法脈賴有良嗣東海西川大圓鏡智生死去來三昧遊戲月印婁江式符讖記巍峨窣堵幻身是寄我作銘詞十紀一二百千萬偈元無半字康熙八年歲次己酉仲秋望日光祿大夫禮部尚書加一級前兵刑二部尚書都察院兩掌院事左都御史乙未甲辰充殿試讀卷官戶刑二部左右侍郎翰林院提督四譯館太常寺少卿吏禮兵科都右給事中甲戌進士出身淮南法弟龔鼎孳頓首拜撰
